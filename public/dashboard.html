<script>
    // 1. Get the token from the current URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const statusDot = document.getElementById('status-dot'); // The red/green light in your image

    if (!token) {
        alert("No security token found in URL!");
    } else {
        refreshDashboard();
    }

    async function refreshDashboard() {
        try {
            // 2. Fetch data from the server using the token
            const response = await fetch(`/admin/dashboard?token=${token}`);
            const data = await response.json();

            if (data.success) {
                // Change status to Green (Online)
                statusDot.style.color = '#10b981'; 
                document.getElementById('status-text').innerText = 'Server Online';

                // Update UI Counters
                document.getElementById('total-keys').innerText = data.stats.total;
                document.getElementById('full-keys').innerText = data.stats.full;
                document.getElementById('trial-keys').innerText = data.stats.trial;
                document.getElementById('active-devices').innerText = data.stats.devices;

                // Populate Recent Keys Table
                const tableBody = document.getElementById('recent-keys-body');
                tableBody.innerHTML = data.recent.map(k => `
                    <tr>
                        <td>${k.key_display}</td>
                        <td>${k.type}</td>
                        <td>${k.email}</td>
                        <td>${k.is_active ? '✅' : '❌'}</td>
                    </tr>
                `).join('');
            }
        } catch (error) {
            console.error("Connection Error:", error);
            statusDot.style.color = '#ef4444'; // Stay Red (Unreachable)
        }
    }
</script>
