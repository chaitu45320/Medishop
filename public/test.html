<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Medishop Server Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#060d19;color:#e2eaf4;padding:24px;text-align:center}
h2{color:#00c9a7;font-size:20px;margin-bottom:6px}
p{color:#6b8ab0;font-size:13px;margin-bottom:20px}
.btn{
  background:#00c9a7;color:#000;border:none;padding:12px 28px;
  border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;
  display:block;width:100%;max-width:320px;margin:0 auto 12px;
  transition:background .15s;
}
.btn:hover{background:#00e6be}
.result{
  background:#0c1a2e;border-radius:10px;padding:16px;
  margin:16px auto;max-width:400px;font-size:13px;
  word-break:break-all;text-align:left;line-height:1.6;
  border:1px solid #1a3050;
}
.ok{border-color:#22c55e!important;color:#22c55e}
.err{border-color:#ef4444!important;color:#ef4444}
.brand{color:#00c9a7;font-weight:700;font-size:22px;margin-bottom:4px}
.version{font-size:11px;color:#6b8ab0;margin-bottom:24px}
</style>
</head>
<body>
<div class="brand">💊 Medishop</div>
<div class="version">Pharmacy Billing — License Server</div>
<h2>Server Connectivity Test</h2>
<p>Open this page on your phone or PC to test server connectivity</p>

<button class="btn" onclick="testHealth()">🔌 Test Server Connection</button>
<div id="result" class="result" style="display:none"></div>

<script>
function testHealth() {
  var url = window.location.origin + '/health';
  var div = document.getElementById('result');
  div.style.display = 'block';
  div.className = 'result';
  div.textContent = 'Testing ' + url + ' …';

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      div.className = 'result ok';
      div.textContent = '✅ Server is Online!\n\n' + JSON.stringify(d, null, 2);
    })
    .catch(function(e) {
      div.className = 'result err';
      div.textContent = '❌ Connection Failed: ' + e.message + '\n\nTried: ' + url + '\n\nCheck that the server is running and accessible from this network.';
    });
}
window.onload = testHealth;
</script>
</body>
</html>
